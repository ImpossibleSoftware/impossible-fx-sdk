plugins {
    id 'java-library'
}

group = 'io.impossible'
archivesBaseName = 'impossible-fx'
version = '3.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

repositories {
    mavenCentral()
}

dependencies {
    api 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
}
